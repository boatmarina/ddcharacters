<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dark purple background -->
  <rect width="100" height="100" rx="18" fill="#4C1D95"/>

  <!-- D20 pentagon face -->
  <polygon
    points="50,12 88,38 74,82 26,82 12,38"
    fill="#6D28D9"
    stroke="#A78BFA"
    stroke-width="3"
    stroke-linejoin="round"
  />

  <!-- Internal lines from center (~50,51) to each vertex, creating the D20 face pattern -->
  <line x1="50" y1="12" x2="50" y2="51" stroke="#DDD6FE" stroke-width="1.5" opacity="0.75"/>
  <line x1="88" y1="38" x2="50" y2="51" stroke="#DDD6FE" stroke-width="1.5" opacity="0.75"/>
  <line x1="74" y1="82" x2="50" y2="51" stroke="#DDD6FE" stroke-width="1.5" opacity="0.75"/>
  <line x1="26" y1="82" x2="50" y2="51" stroke="#DDD6FE" stroke-width="1.5" opacity="0.75"/>
  <line x1="12" y1="38" x2="50" y2="51" stroke="#DDD6FE" stroke-width="1.5" opacity="0.75"/>

  <!-- "20" label -->
  <text
    x="50"
    y="59"
    text-anchor="middle"
    fill="#F5F3FF"
    font-size="28"
    font-weight="bold"
    font-family="Georgia, 'Times New Roman', serif"
  >20</text>
</svg>
